services:

  # ── MySQL ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: contacts-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contacts_db
      MYSQL_USER: contacts_user
      MYSQL_PASSWORD: ContactsPass123!
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contacts-net

  # ── RabbitMQ ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: contacts-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contacts-net

  # ── Elasticsearch ──────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:9.2.2
    container_name: contacts-elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=elastic123
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:elastic123 http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - contacts-net

  # ── contacts-api ───────────────────────────────────────────
  contacts-api:
    build:
      context: ./contacts-api
      dockerfile: Dockerfile
    container_name: contacts-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/contacts_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: contacts_user
      SPRING_DATASOURCE_PASSWORD: ContactsPass123!  #!!
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123  #!!
      APP_JWT_SECRET: ZmFrZS1zZWNyZXQta2V5LXBlci1zdmlsdXBwby1jb250YWN0cy1hcGktcHJvZ2V0dG8tY29sbG9xdWlv  #!!
      APP_JWT_EXPIRATION_MS: 3600000
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - contacts-net

  # ── contacts-search-processor ──────────────────────────────
  contacts-search-processor:
    build:
      context: ./contacts-search-processor
      dockerfile: Dockerfile
    container_name: contacts-search-processor
    ports:
      - "8081:8081"
    environment:
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_ELASTICSEARCH_USERNAME: elastic
      SPRING_ELASTICSEARCH_PASSWORD: elastic123  #!!
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123  #!!
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - contacts-net

# ── Volumi persistenti ─────────────────────────────────────
volumes:
  mysql-data:
  rabbitmq-data:
  es-data:

# ── Rete interna ───────────────────────────────────────────
networks:
  contacts-net:
    driver: bridge